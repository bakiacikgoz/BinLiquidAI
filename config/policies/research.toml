policy_schema_version = "1.0"
policy_version = "v0.3-research"
web_egress = "deny"

[[task_rules]]
id = "task-chat-allow"
task_types = ["chat", "plan"]
action = "allow"
explain = "chat and planning tasks are allowed"

[[task_rules]]
id = "task-research-allow"
task_types = ["research"]
action = "allow"
explain = "research profile allows research tasks"

[[task_rules]]
id = "task-code-approval"
task_types = ["code", "mixed"]
action = "require_approval"
explain = "code tasks still require approval"

[[tool_rules]]
id = "tool-python"
command_roots = ["python"]
action = "allow"
arg_deny_regex = ["rm\\s+-rf", "os\\.remove", "shutil\\.rmtree"]
explain = "python commands allowed unless destructive patterns are detected"

[[tool_rules]]
id = "tool-uv"
command_roots = ["uv", "pytest", "ruff", "rg"]
action = "allow"
arg_deny_regex = ["--system", "pip\\s+install\\s+--break-system-packages"]
explain = "tooling commands allowed with restricted arguments"

[[handoff_rules]]
id = "handoff-default-allow"
from_roles = []
to_roles = []
action = "allow"
explain = "allow role handoffs by explicit default rule"

[[memory_scope_rules]]
id = "memory-default-allow"
scopes = ["session", "team", "case"]
producer_roles = []
visibilities = ["private", "team", "case"]
action = "allow"
explain = "allow scoped memory writes by explicit default rule"

[pii_rules]
patterns = ["[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\\.[A-Za-z]{2,}", "(api|token|secret|password)[=: ]+[A-Za-z0-9._-]+"]
