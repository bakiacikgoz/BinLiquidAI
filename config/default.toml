[app]
model_name = "lfm2.5-thinking:1.2b"
profile_name = "default"
llm_provider = "auto"
fallback_provider = "transformers"
fallback_enabled = true
hf_model_id = "distilgpt2"
device = "cpu"
router_mode = "rule"
shadow_router_enabled = false
shadow_router_mode = "sltc"
planner_temperature = 0.0
answer_temperature = 0.2
router_confidence_threshold = 0.6
latency_budget_ms = 4000
debug_mode = false
privacy_mode = true
enable_persistent_memory = false
memory_ttl_days = 30
fast_path_regret_window = 2
fast_path_regret_threshold = 0.2
env_prefix = "BINLIQUID"
web_enabled = false
workspace_root = "."
trace_dir = ".binliquid/traces"
router_dataset_path = ".binliquid/research/router_dataset.jsonl"

[limits]
expert_timeout_ms = 2500
max_retries = 1
circuit_breaker_threshold = 3
circuit_breaker_cooldown_s = 300
llm_timeout_ms = 60000
max_tool_calls = 4
max_recursion_depth = 3

[sltc]
enabled = false
router_mode = "shadow"
decay = 0.82
spike_threshold = 0.55
confidence_threshold = 0.6
failure_penalty_weight = 0.35
latency_penalty_weight = 0.12
need_bonus = 0.12
conf_bonus = 0.2
task_bias_overrides = {}

[memory]
db_path = ".binliquid/memory.sqlite3"
salience_threshold = 0.62
salience_decay = 0.82
max_rows = 5000
context_top_k = 4
expert_bonus = 0.06
task_bonus = 0.08
spike_reduction = 0.5
rank_salience_weight = 0.7
rank_recency_weight = 0.3

[memory.keyword_weights]
remember = 0.18
"hatırla" = 0.18
plan = 0.12
"adım" = 0.12
deadline = 0.1
todo = 0.1
bug = 0.12
hata = 0.12
important = 0.16
"önemli" = 0.16

[planner]
repair_enabled = true
repair_max_attempts = 1
prompt_variant = "strict_v2"

[code_verify]
enabled = true
lint_enabled = true
test_collect_enabled = true
targeted_tests_enabled = false
timeout_s = 15
retry_max = 1
retry_strategy = "failure_aware"

[governance]
enabled = true
policy_path = "config/policies/default.toml"
policy_fail_mode = "fail_closed"
approval_store_path = ".binliquid/governance/approvals.sqlite3"
audit_dir = ".binliquid/audit"
pii_redaction_enabled = true
approval_ttl_seconds = 86400
decision_engine_version = "v0.3"

[team]
enabled = true
max_parallel_tasks = 4
max_total_tasks = 64
max_handoff_depth = 8
checkpoint_db_path = ".binliquid/team/checkpoints.sqlite3"
artifact_dir = ".binliquid/team/jobs"
