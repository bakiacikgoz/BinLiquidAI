[app]
model_name = "lfm2.5-thinking:1.2b"
profile_name = "lite"
llm_provider = "auto"
fallback_provider = "transformers"
fallback_enabled = false
hf_model_id = "distilgpt2"
device = "cpu"
router_mode = "rule"
shadow_router_enabled = false
shadow_router_mode = "sltc"
planner_temperature = 0.0
answer_temperature = 0.1
router_confidence_threshold = 0.6
latency_budget_ms = 3000
debug_mode = false
privacy_mode = true
enable_persistent_memory = false
memory_ttl_days = 14
fast_path_regret_window = 2
fast_path_regret_threshold = 0.2
env_prefix = "BINLIQUID"
web_enabled = false
workspace_root = "."
trace_dir = ".binliquid/traces"
router_dataset_path = ".binliquid/research/router_dataset.jsonl"

[limits]
expert_timeout_ms = 1800
max_retries = 1
circuit_breaker_threshold = 3
circuit_breaker_cooldown_s = 300
llm_timeout_ms = 45000
max_tool_calls = 3
max_recursion_depth = 2

[sltc]
enabled = false
router_mode = "off"
decay = 0.82
spike_threshold = 0.55
confidence_threshold = 0.6
failure_penalty_weight = 0.35
latency_penalty_weight = 0.12
need_bonus = 0.12
conf_bonus = 0.2
task_bias_overrides = {}

[memory]
db_path = ".binliquid/memory.sqlite3"
salience_threshold = 0.65
salience_decay = 0.84
max_rows = 3000
context_top_k = 3
expert_bonus = 0.04
task_bonus = 0.06
spike_reduction = 0.5
rank_salience_weight = 0.7
rank_recency_weight = 0.3

[memory.keyword_weights]
remember = 0.16
"hatırla" = 0.16
plan = 0.1
"adım" = 0.1
deadline = 0.1
todo = 0.1
bug = 0.12
hata = 0.12
important = 0.14
"önemli" = 0.14

[planner]
repair_enabled = true
repair_max_attempts = 1
prompt_variant = "strict_v2"

[code_verify]
enabled = true
lint_enabled = true
test_collect_enabled = true
targeted_tests_enabled = false
timeout_s = 12
retry_max = 1
retry_strategy = "failure_aware"
