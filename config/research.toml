[app]
model_name = "lfm2.5-thinking:1.2b"
profile_name = "research"
llm_provider = "auto"
fallback_provider = "transformers"
fallback_enabled = true
hf_model_id = "distilgpt2"
device = "cpu"
router_mode = "sltc"
shadow_router_enabled = true
shadow_router_mode = "rule"
planner_temperature = 0.0
answer_temperature = 0.15
router_confidence_threshold = 0.55
latency_budget_ms = 5500
debug_mode = true
privacy_mode = true
enable_persistent_memory = true
memory_ttl_days = 45
fast_path_regret_window = 3
fast_path_regret_threshold = 0.15
env_prefix = "BINLIQUID"
web_enabled = false
workspace_root = "."
trace_dir = ".binliquid/traces"
router_dataset_path = ".binliquid/research/router_dataset.jsonl"

[limits]
expert_timeout_ms = 3800
max_retries = 1
circuit_breaker_threshold = 3
circuit_breaker_cooldown_s = 300
llm_timeout_ms = 70000
max_tool_calls = 6
max_recursion_depth = 4

[sltc]
enabled = true
router_mode = "active"
decay = 0.87
spike_threshold = 0.5
confidence_threshold = 0.55
failure_penalty_weight = 0.35
latency_penalty_weight = 0.12
need_bonus = 0.12
conf_bonus = 0.2
task_bias_overrides = {}

[memory]
db_path = ".binliquid/memory.sqlite3"
salience_threshold = 0.55
salience_decay = 0.86
max_rows = 12000
context_top_k = 6
expert_bonus = 0.08
task_bonus = 0.1
spike_reduction = 0.45
rank_salience_weight = 0.75
rank_recency_weight = 0.25

[memory.keyword_weights]
remember = 0.18
"hatırla" = 0.18
plan = 0.12
"adım" = 0.12
deadline = 0.1
todo = 0.1
bug = 0.12
hata = 0.12
important = 0.16
"önemli" = 0.16

[planner]
repair_enabled = true
repair_max_attempts = 1
prompt_variant = "strict_v3"

[code_verify]
enabled = true
lint_enabled = true
test_collect_enabled = true
targeted_tests_enabled = true
timeout_s = 20
retry_max = 2
retry_strategy = "failure_aware"
