name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Sync dependencies
        run: uv sync --python 3.11 --extra dev

      - name: Lint
        run: uv run ruff check .

      - name: Tests
        run: uv run pytest -q

      - name: Smoke benchmark gate
        run: uv run binliquid benchmark smoke --mode A --profile balanced --task-limit 1
