name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Sync dependencies
        run: uv sync --python 3.11 --extra dev

      - name: Lint
        run: uv run ruff check .

      - name: Tests
        run: uv run pytest -q

      - name: Config resolve gate
        run: uv run binliquid config resolve --profile balanced --json

      - name: Write test summary artifact
        run: |
          mkdir -p artifacts
          python - <<'PY'
          import json
          from datetime import datetime, timezone
          payload = {
              "artifact": "test_summary",
              "generated_at": datetime.now(timezone.utc).isoformat().replace("+00:00", "Z"),
              "status": "ok",
              "data": {"ci": "github_actions", "tests": "passed"},
          }
          with open("artifacts/test_summary.json", "w", encoding="utf-8") as f:
              json.dump(payload, f, indent=2, ensure_ascii=False)
          PY

      - name: Smoke benchmark gate
        run: uv run binliquid benchmark smoke --mode A --profile balanced --task-limit 1

  pilot-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Sync dependencies
        run: uv sync --python 3.11 --extra dev

      - name: Targeted pilot gate tests
        run: |
          uv run pytest -q \
            tests/test_team_bounded_concurrency.py \
            tests/test_team_governance.py \
            tests/test_team_memory_fail_closed.py \
            tests/test_team_audit_envelope.py \
            tests/test_team_cli.py \
            tests/test_team_pilot_gate.py

      - name: Team runtime pilot gate
        run: |
          uv run binliquid team validate --spec examples/team/restricted_pilot.yaml --json
          uv run binliquid team pilot-check \
            --spec examples/team/restricted_pilot.yaml \
            --profile restricted \
            --mode deterministic \
            --report artifacts/team_pilot_report.json \
            --json
